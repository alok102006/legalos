version: '3.8'

services:
  db:
    image: postgres:15-alpine
    container_name: legalos_db
    restart: always
    environment:
      POSTGRES_USER: legalos
      POSTGRES_PASSWORD: legalos_secure_password
      POSTGRES_DB: legalos
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U legalos -d legalos"]
      interval: 5s
      timeout: 5s
      retries: 5

  qdrant:
    image: qdrant/qdrant:latest
    container_name: legalos_qdrant
    restart: always
    ports:
      - "6333:6333"
      - "6334:6334"
    volumes:
      - qdrant_data:/qdrant/storage

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: legalos_backend
    restart: always
    environment:
      - DATABASE_URL=postgresql+asyncpg://legalos:legalos_secure_password@db:5432/legalos
      - QDRANT_URL=http://qdrant:6333
      - QDRANT_API_KEY=
      - GEMINI_API_KEY=${GEMINI_API_KEY}
      - LLM_PROVIDER=gemini
      - FRONTEND_URL=http://localhost:5173
      - HF_HOME=/app/model_cache
      - SENTENCE_TRANSFORMERS_HOME=/app/model_cache
    ports:
      - "8000:8000"
    volumes:
      - model_cache:/app/model_cache
      # Mount source code for local dev reload
      - ./backend:/app
    depends_on:
      db:
        condition: service_healthy
      qdrant:
        condition: service_started

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: legalos_frontend
    restart: always
    ports:
      - "5173:5173"
    environment:
      - VITE_API_URL=http://localhost:8000
    depends_on:
      - backend

volumes:
  postgres_data:
  qdrant_data:
  model_cache:
